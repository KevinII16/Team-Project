<html>

<body>
<header>
  <h1>Student Scheduler</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="school.html">School Scheduler</a>
    <a href="work.html">Work Scheduler</a>

<div class="container">

<h2>Assignment Scheduler</h2>

<div class="card">
<ul>
<li>Database Project - Due 10th April</li>
<li>Web Dev Report - Due 15th April</li>
</ul>
</div>

<div class="card">
  <h3>Add Assignment</h3>

  <form class="add-form">

    <label>Assignment Name</label>
    <input type="text" placeholder="e.g. Database Project">

    <label>Module</label>
    <input type="text" placeholder="e.g. Advanced Databases">

    <label>Due Date</label>
    <input type="date">

    <button type="submit">Add Assignment</button>

  </form>
</div>

</div>
</body>
