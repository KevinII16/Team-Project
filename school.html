<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Scheduler</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>Student Scheduler</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="school.html">School Scheduler</a>
    <a href="work.html">Work Scheduler</a>
    <a href="assignments.html">Assignment Scheduler</a>
  </nav>
</header>
<div class="container">

<h2>School Schedule</h2>
<div class="card">
<div class="grid-5">
<div class="cell header-cell">Time</div>
<div class="cell header-cell">Mon</div>
<div class="cell header-cell">Tue</div>
<div class="cell header-cell">Wed</div>
<div class="cell header-cell">Thu</div>
<div class="cell header-cell">Fri</div>

<div class="cell">9:30</div>
<div class="cell">Math</div>
<div class="cell">CS</div>
<div class="cell"></div>
<div class="cell">English</div>
<div class="cell"></div>

<div class="cell">11:00</div>
<div class="cell"></div>
<div class="cell">Databases</div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell">Web Dev</div>
</div>
</div>
<div class="card">

<h3>Add Class</h3>

<form id="classForm">

<label>Class Name</label>
<input type="text" id="className" placeholder="e.g. Databases" required>

<label>Day</label>
<select id="classDay">
<option value="mon">Monday</option>
<option value="tue">Tuesday</option>
<option value="wed">Wednesday</option>
<option value="thu">Thursday</option>
<option value="fri">Friday</option>
</select>

<label>Time</label>
<input type="time" id="classTime" required>

<button type="submit">Add Class</button>

</form>

</div>

</div>
</body>
</html>
