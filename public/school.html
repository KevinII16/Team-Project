<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Scheduler</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Student Scheduler</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="school.html">School Scheduler</a>
    <a href="work.html">Work Scheduler</a>
    <a href="assignments.html">Assignment Scheduler</a>
  </nav>
</header>

<div class="container">

  <h2>School Schedule</h2>

  <div class="schedule-layout">

    <!-- LEFT SIDE -->
    <div class="timetable-section">

      <div class="week-tabs">
        <button class="week-btn active">Week 1</button>
        <button class="week-btn">Week 2</button>
        <button class="week-btn">Week 3</button>
      </div>

      <div class="card">
        <div class="grid-5" id="timetable">

          <div class="cell header-cell">Time</div>
          <div class="cell header-cell">Mon</div>
          <div class="cell header-cell">Tue</div>
          <div class="cell header-cell">Wed</div>
          <div class="cell header-cell">Thu</div>
          <div class="cell header-cell">Fri</div>

          <div class="empty-state">
            No classes yet. Add your first class →
          </div>

        </div>
      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="add-class-panel">

      <h3>Add Class</h3>

      <form id="classForm">

        <label>Class Name</label>
        <input type="text" id="className" required>

        <label>Day</label>
        <select id="classDay">
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
        </select>

        <label>Time</label>
        <input type="time" id="classTime" required>

        <button type="submit">Add Class</button>

      </form>

    </div>

  </div>

</div>

<script src="js/school.js"></script>

</body>
</html>
