<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - School Schedule</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>StudySync</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="school.html">School Scheduler</a>
    <a href="work.html">Work Scheduler</a>
    <a href="assignments.html">Assignment Scheduler</a>
  </nav>
</header>

<div class="container">

  <div class="schedule-layout">

    <!-- LEFT SIDE -->
    <div class="timetable-section">

      <h2>School Schedule</h2>

      <!-- WEEK TABS -->
      <div class="week-tabs">
        <button class="week-btn active">Week 1</button>
        <button class="week-btn">Week 2</button>
        <button class="week-btn">Week 3</button>
      </div>

      <!-- TIMETABLE -->
      <div class="card">
        <div class="grid-5" id="timetable">

          <!-- HEADER -->
          <div class="cell header-cell">Time</div>
          <div class="cell header-cell">Mon</div>
          <div class="cell header-cell">Tue</div>
          <div class="cell header-cell">Wed</div>
          <div class="cell header-cell">Thu</div>
          <div class="cell header-cell">Fri</div>

          <!-- ROW 1 -->
          <div class="cell">9:00</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>

          <!-- ROW 2 -->
          <div class="cell">11:00</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>

          <!-- ROW 3 -->
          <div class="cell">1:00</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>

        </div>
      </div>

    </div>


    <!-- RIGHT SIDE -->
    <div class="add-class-panel">

      <h3>Add Class</h3>

      <form id="classForm">

        <label>Class Name</label>
        <input type="text" id="className" placeholder="e.g. Databases" required>

        <label>Day</label>
        <select id="classDay">
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
        </select>

        <label>Time</label>
        <select id="classTime">
          <option value="0">9:00</option>
          <option value="1">11:00</option>
          <option value="2">1:00</option>
        </select>

        <button type="submit">Add Class</button>

      </form>

    </div>

  </div>

</div>
