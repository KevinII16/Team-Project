<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>StudySync</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="school.html">School Scheduler</a>
    <a href="work.html">Work Scheduler</a>
    <a href="assignments.html">Assignment Scheduler</a>
  </nav>
</header>
<div class="container">

  <h2>Work Shift Scheduler</h2>

  <div class="card">
    <div class="grid-7">
      <div class="cell header-cell">Mon</div>
      <div class="cell header-cell">Tue</div>
      <div class="cell header-cell">Wed</div>
      <div class="cell header-cell">Thu</div>
      <div class="cell header-cell">Fri</div>
      <div class="cell header-cell">Sat</div>
      <div class="cell header-cell">Sun</div>

      <div class="cell"><div class="shift-block">10:00 - 14:00</div></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"><div class="shift-block">12:00 - 16:00</div></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>
  </div>

  <div class="card">
    <h3>Add Work Shift</h3>
    <form class="add-form">
      <label>Day</label>
      <select>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
      </select>

      <label>Start Time</label>
      <input type="time">

      <label>End Time</label>
      <input type="time">

      <button type="submit">Add Shift</button>
    </form>
  </div>
</div>
</body>
</html>
