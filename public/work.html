<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Work</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>StudySync</h1>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="school.html">School Scheduler</a>
    <a href="work.html">Work Scheduler</a>
    <a href="assignments.html">Assignment Scheduler</a>
  </nav>
</header>

<div class="container">

  <h2>Work Shift Scheduler</h2>

  <div class="schedule-layout">

    <!-- LEFT -->
    <div class="timetable-section">
      <div class="card">
        <div class="grid-7" id="workTable">
          <!-- JS fills this -->
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="add-class-panel">

      <h3>Add Work Shift</h3>

      <form id="workForm">

        <label>Day</label>
        <select id="workDay">
          <option value="1">Monday</option>
          <option value="2">Tuesday</option>
          <option value="3">Wednesday</option>
          <option value="4">Thursday</option>
          <option value="5">Friday</option>
          <option value="6">Saturday</option>
          <option value="7">Sunday</option>
        </select>

        <label>Start Time</label>
        <input type="time" id="startTime" required>

        <label>End Time</label>
        <input type="time" id="endTime" required>

        <label>Hourly Rate (€)</label>
        <input type="number" id="workRate" step="0.01" required>

        <button type="submit">Add Shift</button>

      </form>

    </div>

  </div>

</div>

<script src="js/work.js"></script>

</body>
</html>
